<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — ShopKart</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header"></div>

<main class="container" style="padding: 28px 20px 60px;">
  <h1>My Account</h1>

  <div class="admin-panel" style="margin-top:16px;">
    <h2>Profile</h2>
    <p><strong id="acctName"></strong><br><span class="muted" id="acctEmail"></span></p>
  </div>

  <div class="admin-panel">
    <h2>Saved Addresses</h2>
    <div id="acctAddresses"></div>
  </div>

  <div class="admin-panel">
    <h2>Order History &amp; Tracking</h2>
    <div id="orderHistory"></div>
  </div>
</main>

<div id="site-footer"></div>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/account.js"></script>
