<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — ShopKart</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-row container" style="justify-content: space-between;">
    <a href="index.html" class="brand">Shop<span>Kart</span></a>
  </div>
</header>

<main class="form-shell">
  <h1>Sign in</h1>
  <p class="sub">Welcome back. Enter your details to continue.</p>

  <div class="demo-note">
    Demo accounts — <button type="button" id="fillDemo" style="border:none;background:none;color:#15327A;font-weight:700;cursor:pointer;padding:0;">use shopper</button>
    &nbsp;or&nbsp;
    <button type="button" id="fillAdmin" style="border:none;background:none;color:#15327A;font-weight:700;cursor:pointer;padding:0;">use admin</button>
  </div>

  <div class="alert alert-error" id="loginError"></div>

  <form id="loginForm">
    <div class="field">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" required placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
  </form>

  <p class="form-foot">New to ShopKart? <a href="register.html">Create an account</a></p>
</main>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
