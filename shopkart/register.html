<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — ShopKart</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-row container" style="justify-content: space-between;">
    <a href="index.html" class="brand">Shop<span>Kart</span></a>
  </div>
</header>

<main class="form-shell">
  <h1>Create your account</h1>
  <p class="sub">Join ShopKart to track orders and save your details for faster checkout.</p>

  <form id="registerForm">
    <div class="field">
      <label for="regName">Full name</label>
      <input type="text" id="regName" required placeholder="Jane Doe">
      <div class="field-error" id="err-regName"></div>
    </div>
    <div class="field">
      <label for="regEmail">Email</label>
      <input type="email" id="regEmail" required placeholder="you@example.com">
      <div class="field-error" id="err-regEmail"></div>
    </div>
    <div class="field">
      <label for="regPhone">Phone number</label>
      <input type="tel" id="regPhone" required placeholder="9876543210" maxlength="10">
      <div class="field-error" id="err-regPhone"></div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" required placeholder="••••••••">
        <div class="field-error" id="err-regPassword"></div>
      </div>
      <div class="field">
        <label for="regConfirm">Confirm password</label>
        <input type="password" id="regConfirm" required placeholder="••••••••">
        <div class="field-error" id="err-regConfirm"></div>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
  </form>

  <p class="form-foot">Already have an account? <a href="login.html">Sign in</a></p>
</main>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
